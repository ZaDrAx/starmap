<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Interactive de l'Univers</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        :root { --base-font-size: 16px; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; font-size: var(--base-font-size); }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }
        .leaflet-interactive { cursor: pointer !important; }

        /* PANNEAU CONTRÔLES (TEXTE ET LANGUE) */
        #controls-panel { position: absolute; top: 20px; left: 60px; z-index: 10; display: flex; gap: 10px; align-items: center; }
        .btn-a11y { background: rgba(15, 15, 25, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); color: white; font-weight: bold; border-radius: 5px; width: 40px; height: 40px; cursor: pointer; }
        .btn-a11y:hover { background: rgba(0, 255, 255, 0.3); color: #00FFFF; border-color: #00FFFF; }
        
        /* SÉLECTEUR DE LANGUE PUBLIC */
        #lang-selector { background: rgba(15, 15, 25, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 8px; border-radius: 5px; font-weight: bold; outline: none; cursor: pointer; height: 40px; }
        #lang-selector option { background: #151519; }

        #legend-panel { position: absolute; bottom: 30px; right: 20px; z-index: 10; background: rgba(15, 15, 25, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; padding: 15px; color: white; min-width: 150px; }
        #legend-panel h3 { margin: 0 0 10px 0; font-size: 1em; color: #00FFFF; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
        .filter-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 0.9em; cursor: pointer; }
        .filter-item input { cursor: pointer; accent-color: #00FFFF; }

        #info-panel { position: absolute; left: -450px; top: 0; bottom: 0; width: 450px; max-width: 100vw; z-index: 10; background: rgba(15, 15, 25, 0.9); backdrop-filter: blur(15px); border-right: 1px solid rgba(255, 255, 255, 0.1); padding: 30px; box-sizing: border-box; overflow-y: auto; color: white; box-shadow: 10px 0 30px rgba(0, 0, 0, 0.8); transition: left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
        #info-panel.ouvert { left: 0; }
        #btn-fermer { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); border: none; border-radius: 50%; width: 40px; height: 40px; color: white; font-size: 1.2em; cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 20; }

        #carousel-container { position: relative; height: 250px; margin: -30px -30px 20px -30px; width: calc(100% + 60px); overflow: hidden; display: none; background: #000; }
        .carousel-slide { width: 100%; height: 100%; object-fit: cover; display: none; }
        .carousel-slide.active { display: block; }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 10px; cursor: pointer; font-size: 18px; z-index: 15; }
        #prev-btn { left: 10px; border-radius: 5px; } #next-btn { right: 10px; border-radius: 5px; }
        .carousel-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 15; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; }
        .dot.active { background: #00FFFF; box-shadow: 0 0 5px #00FFFF; }

        h1 { margin-top: 10px; margin-bottom: 5px; color: #00FFFF; font-size: 2em; text-shadow: 0 0 15px rgba(0,255,255,0.4); line-height: 1.1; }
        .type-badge { display: inline-block; background: rgba(255,255,255,0.15); padding: 5px 10px; border-radius: 15px; font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; color: #ccc; margin-bottom: 20px; }
        .description { font-size: 1.05em; line-height: 1.6; color: rgba(255,255,255,0.9); margin-bottom: 30px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .data-card { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .data-label { font-size: 0.75em; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .data-value { font-size: 1.1em; font-weight: bold; color: #fff; word-wrap: break-word; }
        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: rgba(0, 255, 255, 0.1); color: #00FFFF; border: 1px solid rgba(0, 255, 255, 0.3); padding: 5px 12px; border-radius: 20px; font-size: 0.8em; }
        #message-accueil { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 5; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px; color: white; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); pointer-events: none; transition: 0.3s;}
    </style>
</head>
<body>
    <div id="map" aria-label="Carte interactive de l'univers"></div>
    <div id="message-accueil" aria-live="polite">Naviguez et cliquez sur un astre pour l'explorer</div>

    <div id="controls-panel">
        <button class="btn-a11y" id="btn-text-minus" aria-label="Réduire le texte">A-</button>
        <button class="btn-a11y" id="btn-text-plus" aria-label="Agrandir le texte">A+</button>
        
        <select id="lang-selector" aria-label="Changer la langue d'affichage du site">
            <option value="fr">🇫🇷 Français</option>
            <option value="en">🇬🇧 English</option>
            <option value="es">🇪🇸 Español</option>
        </select>
    </div>

    <div id="legend-panel">
        <h3 id="lbl-legend-title">Filtres (Légende)</h3>
        <div id="filter-container"></div>
    </div>

    <div id="info-panel" role="region">
        <button id="btn-fermer" aria-label="Fermer">✖</button>
        <div id="carousel-container">
            <div id="carousel-images"></div>
            <button class="carousel-btn" id="prev-btn">&#10094;</button>
            <button class="carousel-btn" id="next-btn">&#10095;</button>
            <div class="carousel-dots" id="carousel-dots"></div>
        </div>
        <h1 id="info-nom">Nom</h1>
        <div class="type-badge" id="info-type">Type</div>
        <div class="description" id="info-description">Description</div>
        <div class="data-grid" id="info-grid"></div>
        <div class="tags-container" id="info-tags"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="index.js"></script>
</body>
</html>
