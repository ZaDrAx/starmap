<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Administration - Carte de l'Espace</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }
        
        #admin-panel { 
            position: absolute; right: 20px; top: 20px; bottom: 20px; width: 450px; z-index: 10;
            background: rgba(20, 20, 30, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
            padding: 25px; box-sizing: border-box; overflow-y: auto; color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; gap: 10px;
        }

        #admin-panel::-webkit-scrollbar { width: 8px; }
        #admin-panel::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.5); border-radius: 4px; }

        h2, h3 { margin: 0; text-align: center; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        label { font-size: 0.85em; color: rgba(255,255,255,0.8); display: flex; justify-content: space-between; align-items: center; }
        
        input[type="text"], input[type="number"], textarea, select { 
            width: 100%; padding: 8px; box-sizing: border-box; background: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: white; outline: none; margin-top: 3px;
        }
        select option { background: #1a1a1a; }

        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
        .btn-option { 
            flex: 1; min-width: 28%; padding: 8px; background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: white; cursor: pointer; font-size: 1.1em;
        }
        .btn-option.active { background: rgba(0, 255, 255, 0.3); border-color: #00FFFF; }

        .outils-dessin { display: none; gap: 10px; margin-top: 5px; }
        .btn-outil { flex: 1; padding: 8px; background: rgba(255, 255, 255, 0.2); border: none; border-radius: 8px; color: white; cursor: pointer; text-align: center; }
        .btn-outil:hover { background: rgba(255, 255, 255, 0.4); }

        .flex-row { display: flex; gap: 15px; align-items: flex-end; }
        .flex-col { flex: 1; display: flex; flex-direction: column; }
        
        input[type="color"] { -webkit-appearance: none; border: none; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; background: transparent; margin-top: 5px; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid rgba(255,255,255,0.4); border-radius: 8px; }

        .slider-container { position: relative; width: 100%; margin-top: 25px; margin-bottom: 5px; }
        .slider-bubble {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            background: #00FFFF; color: #000; padding: 2px 8px; border-radius: 5px;
            font-size: 12px; font-weight: bold; pointer-events: none; transition: left 0.1s; z-index: 2;
        }
        .slider-bubble::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); border-width: 4px 4px 0; border-style: solid; border-color: #00FFFF transparent transparent transparent; }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: rgba(255, 255, 255, 0.3); height: 6px; border-radius: 3px; outline: none; margin: 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #00FFFF; cursor: pointer; box-shadow: 0 0 5px rgba(0,255,255,0.8); }

        .btn-submit { padding: 15px; background: rgba(40, 167, 69, 0.8); border: 1px solid #28a745; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 1.1em; margin-top: 15px; transition: 0.3s; }
        .btn-submit:hover { background: #28a745; }

        /* SECTIONS DÉROULANTES (Accordéons) */
        details { background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 5px; padding: 10px 15px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        details[open] { background: rgba(0,0,0,0.4); border-color: rgba(0,255,255,0.3); }
        summary { font-weight: bold; color: #00FFFF; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; outline: none; }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: '▼'; font-size: 0.8em; transition: transform 0.3s; color: rgba(255,255,255,0.5); }
        details[open] summary::after { transform: rotate(180deg); color: #00FFFF; }
        .details-content { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }

        /* Liste et Filtres */
        .filtres-section { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); margin-top: 15px; }
        #liste-astres { list-style: none; padding: 0; margin: 0; max-height: 150px; overflow-y: auto; margin-top: 10px; }
        #liste-astres li { padding: 8px; background: rgba(0,0,0,0.3); margin-bottom: 5px; border-radius: 5px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center;}
        #liste-astres li:hover { background: rgba(0,255,255,0.2); }
        .tag-badge { font-size: 0.7em; background: rgba(255,255,255,0.2); padding: 2px 5px; border-radius: 3px; margin-left: 5px; }
        .vertex-marker { background: white; border: 2px solid #00FFFF; border-radius: 50%; cursor: grab; box-shadow: 0 0 5px black; }
        .vertex-marker:active { cursor: grabbing; }

        .btn-supprimer-champ { background: transparent; border: none; color: #ff4d4d; font-size: 1.2em; cursor: pointer; padding: 0 5px; }
        .btn-supprimer-champ:hover { color: #ff1a1a; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="admin-panel">
        <h2 id="titre-formulaire">Nouvelle Galaxie</h2>
        <input type="hidden" id="id-edition" value="">
        
        <details open>
            <summary>Informations Générales</summary>
            <div class="details-content">
                <div><label>Nom :</label> <input type="text" id="nom" required></div>
                <div><label>Description :</label> <textarea id="description" rows="2" required></textarea></div>
                <div><label>Tags :</label> <input type="text" id="tags" placeholder="ex: spirale, rouge, amas"></div>
            </div>
        </details>

        <details>
            <summary>Paramètres Physiques</summary>
            <div class="details-content">
                <div class="flex-row">
                    <div class="flex-col">
                        <label>Type :</label>
                        <select id="type-astre">
                            <option value="Galaxie Spirale">Galaxie Spirale</option>
                            <option value="Galaxie Elliptique">Galaxie Elliptique</option>
                            <option value="Galaxie Irrégulière">Galaxie Irrégulière</option>
                            <option value="Quasar">Quasar</option>
                            <option value="Étoile de la Voie Lactée">Étoile (Avant-plan)</option>
                            <option value="Inconnu">Inconnu</option>
                        </select>
                    </div>
                    <div class="flex-col">
                        <label>Distance (Md AL) :</label>
                        <input type="number" id="distance" step="0.1" placeholder="ex: 12.5">
                    </div>
                </div>
                <div class="flex-row">
                    <div class="flex-col">
                        <label>Masse (M☉) :</label>
                        <input type="text" id="masse" placeholder="ex: 10^11">
                    </div>
                    <div class="flex-col">
                        <label>Masse Gaz (M☉) :</label>
                        <input type="text" id="masse-gaz" placeholder="ex: 10^9">
                    </div>
                </div>
                <div class="flex-row">
                    <div class="flex-col">
                        <label>Taux de formation (SFR) :</label>
                        <input type="text" id="sfr" placeholder="ex: 50 M☉/an">
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); width: 100%; margin: 10px 0;">
                <div id="conteneur-champs-perso"></div>
                <button type="button" class="btn-outil" id="btn-ajouter-champ" style="margin-top: 5px; border: 1px dashed rgba(0,255,255,0.5); color: #00FFFF; background: rgba(0,255,255,0.1);">+ Ajouter un paramètre personnalisé</button>
            </div>
        </details>

        <details>
            <summary>Apparence sur la carte</summary>
            <div class="details-content">
                <label>Forme :</label>
                <div class="btn-group" id="group-forme">
                    <button type="button" class="btn-option active" data-value="cercle" title="Cercle">⏺️</button>
                    <button type="button" class="btn-option" data-value="carre" title="Carré">⏹️</button>
                    <button type="button" class="btn-option" data-value="triangle" title="Triangle">🔼</button>
                    <button type="button" class="btn-option" data-value="hexagone" title="Hexagone">⬢</button>
                    <button type="button" class="btn-option" data-value="etoile" title="Étoile">⭐</button>
                    <button type="button" class="btn-option" data-value="polygone" title="Dessin Libre">✏️</button>
                </div>
                <input type="hidden" id="forme" value="cercle">

                <div class="outils-dessin" id="outils-polygone">
                    <button type="button" class="btn-outil" id="btn-undo" title="Ctrl+Z">↩️ Annuler</button>
                    <button type="button" class="btn-outil" id="btn-redo" title="Ctrl+Y">↪️ Refaire</button>
                    <button type="button" class="btn-outil" style="background: rgba(255, 165, 0, 0.8);" id="btn-terminer">✅ Terminer</button>
                </div>

                <label style="margin-top: 10px;">Taille :</label>
                <div class="slider-container">
                    <div class="slider-bubble" id="bulle-taille">30</div>
                    <input type="range" id="taille" min="5" max="200" value="30">
                </div>

                <div class="flex-row">
                    <div class="flex-col" style="flex: 0.3;">
                        <label>Fond :</label><input type="color" id="couleur-fond" value="#00FFFF">
                    </div>
                    <div class="flex-col">
                        <label>Opacité :</label>
                        <div class="slider-container">
                            <div class="slider-bubble" id="bulle-opacite-fond">0.5</div>
                            <input type="range" id="opacite-fond" min="0" max="1" step="0.1" value="0.5">
                        </div>
                    </div>
                </div>

                <div class="flex-row">
                    <div class="flex-col" style="flex: 0.3;">
                        <label>Contour :</label><input type="color" id="couleur-contour" value="#FFFFFF">
                    </div>
                    <div class="flex-col">
                        <label>Épaisseur :</label>
                        <div class="slider-container">
                            <div class="slider-bubble" id="bulle-epaisseur">2</div>
                            <input type="range" id="epaisseur-contour" min="0" max="10" value="2">
                        </div>
                    </div>
                    <div class="flex-col">
                        <label>Opacité :</label>
                        <div class="slider-container">
                            <div class="slider-bubble" id="bulle-opacite-contour">1.0</div>
                            <input type="range" id="opacite-contour" min="0" max="1" step="0.1" value="1.0">
                        </div>
                    </div>
                </div>
            </div>
        </details>

        <button type="button" class="btn-submit" id="btn-sauvegarder">Enregistrer l'Astre</button>

        <div class="filtres-section">
            <h3>Vue & Filtres</h3>
            <div class="flex-row" style="margin-top: 10px;">
                <input type="text" id="filtre-tags" placeholder="Chercher un tag..." style="flex:1;">
                <select id="filtre-forme" style="flex:1; margin-top: 3px;">
                    <option value="">Toutes formes</option>
                    <option value="cercle">Cercle</option>
                    <option value="carre">Carré</option>
                    <option value="triangle">Triangle</option>
                    <option value="hexagone">Hexagone</option>
                    <option value="etoile">Étoile</option>
                    <option value="polygone">Dessin Libre</option>
                </select>
            </div>
            <ul id="liste-astres"></ul>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="admin.js"></script>
</body>
</html>
